<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionStay | Smart Hostel Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/welcome.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div id="particles"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Hero Section -->
        <header class="hero" id="heroSection">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-eye"></i>
                </div>
                <h1 class="logo-text">
                    <span class="vision">Vision</span><span class="stay">Stay</span>
                </h1>
            </div>
            
            <p class="tagline" id="tagline"></p>
            
            <div class="features">
                <div class="feature">
                    <i class="fas fa-brain"></i>
                    <span>AI-Powered</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure Access</span>
                </div>
                <div class="feature">
                    <i class="fas fa-clock"></i>
                    <span>Real-time</span>
                </div>
            </div>

            <div class="auto-msg" id="autoMsg">
                <i class="fas fa-spinner fa-spin"></i>
                <span id="msgText">Initializing secure connection...</span>
            </div>

            <button class="primary-btn glow" id="showLoginBtn">
                <span>Get Started</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </header>

        <!-- Login Section -->
        <section class="login-section" id="loginSection">
            <div class="login-card glass">
                <div class="card-header">
                    <h2><i class="fas fa-user-lock"></i> Authentication Portal</h2>
                    <p>Select your role to continue</p>
                </div>

                <div class="role-buttons">
                    <button class="role-btn" id="adminBtn" onclick="showAdmin()">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                        <small>System Management</small>
                    </button>
                    <button class="role-btn" id="studentBtn" onclick="showStudent()">
                        <i class="fas fa-user-graduate"></i>
                        <span>Student</span>
                        <small>View Dashboard</small>
                    </button>
                </div>

                <!-- Admin Login Form -->
                <form class="login-box" id="adminBox" method="POST" action="/login">
                    <div class="form-header">
                        <div class="icon-circle admin-icon">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <h3>Admin Login</h3>
                    </div>

                    <input type="hidden" name="role" value="admin">

                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="Admin Username" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="submit-btn">
                        <span>Login as Admin</span>
                        <i class="fas fa-sign-in-alt"></i>
                    </button>
                </form>

                <!-- Student Login Form -->
                <form class="login-box" id="studentBox" method="POST" action="/login">
                    <div class="form-header">
                        <div class="icon-circle student-icon">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <h3>Student Login</h3>
                    </div>

                    <input type="hidden" name="role" value="student">

                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="username" placeholder="Roll Number" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" name="password" placeholder="Password (Roll Number)" required autocomplete="current-password">
                    </div>

                    <p class="hint">
                        <i class="fas fa-info-circle"></i>
                        Roll Number is used as both username and password
                    </p>

                    <button type="submit" class="submit-btn student-submit">
                        <span>Login as Student</span>
                        <i class="fas fa-sign-in-alt"></i>
                    </button>
                </form>

                <button class="back-btn" id="backBtn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </button>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 VisionStay. AI-Powered Hostel Management.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/welcome.js') }}"></script>
</body>
</html>
